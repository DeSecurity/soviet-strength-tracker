<script>
  // GitHub Pages SPA fallback for HashRouter
  var path = location.pathname;
  var base = "/blank/";
  if (path.indexOf(base) !== 0) { location.replace(base); }
  else { location.replace(base + "#" + path.slice(base.length) + location.search); }
</script>
